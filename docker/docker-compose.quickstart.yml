services:
  dealdesk:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${DEALDESK_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      DEALDESK_HOME: "/dealdesk"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      DEALDESK_DEPLOYMENT_MODE: "authenticated"
      DEALDESK_DEPLOYMENT_EXPOSURE: "private"
      DEALDESK_PUBLIC_URL: "${DEALDESK_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${DEALDESK_DATA_DIR:-../data/docker-dealdesk}:/dealdesk"
